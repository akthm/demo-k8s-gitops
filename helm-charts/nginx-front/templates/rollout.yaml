{{- if .Values.blueGreen.enabled }}
# ==============================================================================
# Argo Rollout - Blue/Green (replaces Deployment when blueGreen.enabled=true)
# ==============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "nginx-front.fullname" . }}
  labels:
    {{- include "nginx-front.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.blueGreen.revisionHistoryLimit | default 3 }}
  selector:
    matchLabels:
      {{- include "nginx-front.selectorLabels" . | nindent 6 }}
  # ============================================================
  # Blue/Green Strategy
  # ============================================================
  strategy:
    blueGreen:
      activeService: {{ include "nginx-front.fullname" . }}
      previewService: {{ include "nginx-front.fullname" . }}-preview
      autoPromotionEnabled: {{ .Values.blueGreen.autoPromotionEnabled }}
      {{- if .Values.blueGreen.autoPromotionSeconds }}
      autoPromotionSeconds: {{ .Values.blueGreen.autoPromotionSeconds }}
      {{- end }}
      scaleDownDelaySeconds: {{ .Values.blueGreen.scaleDownDelaySeconds | default 30 }}
      {{- if .Values.blueGreen.previewReplicaCount }}
      previewReplicaCount: {{ .Values.blueGreen.previewReplicaCount }}
      {{- end }}
      {{- with .Values.blueGreen.activeMetadata }}
      activeMetadata:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.blueGreen.previewMetadata }}
      previewMetadata:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  # ============================================================
  # Pod Template (identical to Deployment spec)
  # ============================================================
  template:
    metadata:
      labels:
        {{- include "nginx-front.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "nginx-front.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.securityContext.enabled }}
      securityContext:
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
        fsGroupChangePolicy: {{ .Values.securityContext.fsGroupChangePolicy | quote }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort | default 8080 }}
              protocol: TCP
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "nginx-front.fullname" . }}-nginx-conf
            defaultMode: 0444
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
{{- end }}
