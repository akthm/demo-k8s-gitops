          imagePullPolicy: {{ .Values.prefectRunner.image.pullPolicy }}
          env:
            - name: PREFECT_API_URL
              value: http://prefect:4200/api
            - name: SOURCE_DB_HOST
              value: postgres-source
            - name: SOURCE_DB_PORT
              value: "5432"
            - name: SOURCE_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: transit-demo-db
                  key: POSTGRES_DB
            - name: SOURCE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: transit-demo-db
                  key: POSTGRES_USER
            - name: SOURCE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: transit-demo-db
                  key: POSTGRES_PASSWORD
            - name: MIRROR_DB_HOST
              value: postgres-mirror
            - name: MIRROR_DB_PORT
              value: "5432"
            - name: MIRROR_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: transit-demo-db
                  key: POSTGRES_DB
            - name: MIRROR_DB_USER
              valueFrom:
                secretKeyRef:
                  name: transit-demo-db
                  key: POSTGRES_USER
            - name: MIRROR_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: transit-demo-db
                  key: POSTGRES_PASSWORD
            - name: GTFS_URL
              value: {{ .Values.prefectRunner.gtfsUrl | quote }}
            - name: GTFS_CACHE_PATH
              value: /data_cache/israel-public-transportation.zip
            - name: GTFS_CACHE_MAX_AGE_HOURS
              value: {{ .Values.prefectRunner.gtfsCacheMaxAgeHours | quote }}
          volumeMounts:
            - name: cache
              mountPath: /data_cache
          resources:
            {{- toYaml .Values.prefectRunner.resources | nindent 12 }}
      volumes:
        - name: cache
          emptyDir: {}
{{- end }}
