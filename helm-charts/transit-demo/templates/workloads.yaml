spec:
  selector:
    app.kubernetes.io/component: redpanda
  ports:
    - name: kafka
      port: {{ .Values.redpanda.service.kafkaPort }}
      targetPort: kafka
    - name: admin
      port: {{ .Values.redpanda.service.adminPort }}
      targetPort: admin
    - name: proxy
      port: {{ .Values.redpanda.service.proxyPort }}
      targetPort: proxy
{{- end }}
