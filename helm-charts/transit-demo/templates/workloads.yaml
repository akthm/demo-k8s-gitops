apiVersion: v1
kind: Secret
metadata:
  name: transit-demo-db
  labels:
    {{- include "transit-demo.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.credentials.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.credentials.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.credentials.password | quote }}
---
{{- if .Values.storage.mirror.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.storage.mirror.claimName | default "postgres-mirror-data" }}
  labels:
    {{- include "transit-demo.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.storage.mirror.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.storage.mirror.size }}
  {{- if .Values.storage.mirror.storageClassName }}
  storageClassName: {{ .Values.storage.mirror.storageClassName }}
  {{- end }}
{{- end }}
---
{{- if .Values.postgres.source.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-source
  labels:
    {{- include "transit-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-source
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres-source
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres-source
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres-source
          image: {{ .Values.postgres.source.image.repository }}:{{ .Values.postgres.source.image.tag }}
          imagePullPolicy: {{ .Values.postgres.source.image.pullPolicy }}
          args:
            - postgres
            - -c
            - wal_level=logical
            - -c
            - max_wal_senders=10
            - -c
            - max_replication_slots=10
          envFrom:
            - secretRef:
                name: transit-demo-db
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/01_source_schema.sql
              subPath: 01_source_schema.sql
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/02_gtfs_schema.sql
              subPath: 02_gtfs_schema.sql
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/03_dwh_schema.sql
              subPath: 03_dwh_schema.sql
            - name: source-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.source.resources | nindent 12 }}
      volumes:
        - name: init-sql
          configMap:
            name: transit-demo-sql
        - name: source-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-source
  labels:
    {{- include "transit-demo.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: postgres-source
  ports:
    - name: postgres
      port: {{ .Values.postgres.source.service.port }}
      targetPort: postgres
{{- end }}
---
{{- if .Values.postgres.mirror.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-mirror
  labels:
    {{- include "transit-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-mirror
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres-mirror
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres-mirror
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres-mirror
          image: {{ .Values.postgres.mirror.image.repository }}:{{ .Values.postgres.mirror.image.tag }}
          imagePullPolicy: {{ .Values.postgres.mirror.image.pullPolicy }}
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          envFrom:
            - secretRef:
                name: transit-demo-db
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/02_gtfs_schema.sql
              subPath: 02_gtfs_schema.sql
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/03_dwh_schema.sql
              subPath: 03_dwh_schema.sql
            - name: mirror-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.mirror.resources | nindent 12 }}
      volumes:
        - name: init-sql
          configMap:
            name: transit-demo-sql
        - name: mirror-data
          persistentVolumeClaim:
            claimName: {{ .Values.storage.mirror.claimName | default "postgres-mirror-data" }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-mirror
  labels:
    {{- include "transit-demo.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: postgres-mirror
  ports:
    - name: postgres
      port: {{ .Values.postgres.mirror.service.port }}
      targetPort: postgres
{{- end }}
---
{{- if .Values.redpanda.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  labels:
    {{- include "transit-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redpanda
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redpanda
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redpanda
          image: {{ .Values.redpanda.image.repository }}:{{ .Values.redpanda.image.tag }}
          imagePullPolicy: {{ .Values.redpanda.image.pullPolicy }}
          args:
            - redpanda
            - start
            - --smp=1
            - --memory={{ .Values.redpanda.startMemory | default "1G" }}
            - --overprovisioned
            - --node-id=0
            - --check=false
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
            - --pandaproxy-addr=0.0.0.0:8082
            - --advertise-pandaproxy-addr=redpanda:8082
          ports:
            - name: kafka
              containerPort: 9092
            - name: admin
              containerPort: 9644
            - name: proxy
              containerPort: 8082
          readinessProbe:
            exec:
              command: ["rpk", "cluster", "health"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redpanda.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  labels:
