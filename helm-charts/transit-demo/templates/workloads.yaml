{{- if .Values.connect.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connect
  labels:
    {{- include "transit-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: connect
  template:
    metadata:
      labels:
        app.kubernetes.io/component: connect
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: connect
          image: {{ .Values.connect.image.repository }}:{{ .Values.connect.image.tag }}
          imagePullPolicy: {{ .Values.connect.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8083
          env:
            - name: BOOTSTRAP_SERVERS
              value: redpanda:9092
            - name: GROUP_ID
              value: transit-connect
            - name: CONFIG_STORAGE_TOPIC
              value: transit_connect_configs
            - name: OFFSET_STORAGE_TOPIC
              value: transit_connect_offsets
            - name: STATUS_STORAGE_TOPIC
              value: transit_connect_status
            - name: KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE
              value: "true"
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "true"
            - name: KAFKA_HEAP_OPTS
              value: {{ .Values.connect.heapOpts | default "-Xms128M -Xmx512M" | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.connect.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: connect
  labels:
    {{- include "transit-demo.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: connect
  ports:
    - name: http
      port: {{ .Values.connect.service.port }}
      targetPort: http
{{- end }}
