{{- if .Values.pgweb.source.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgweb-source
  labels:
    {{- include "transit-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgweb-source
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: pgweb-source
  template:
    metadata:
      labels:
        app.kubernetes.io/component: pgweb-source
    spec:
      initContainers:
        - name: wait-for-postgres-source
          image: docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres-source 5432; do echo "waiting for postgres-source"; sleep 2; done
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pgweb
          image: {{ .Values.pgweb.source.image.repository }}:{{ .Values.pgweb.source.image.tag }}
          imagePullPolicy: {{ .Values.pgweb.source.image.pullPolicy }}
          env:
            - name: PGWEB_DATABASE_URL
              value: postgres://{{ .Values.postgres.credentials.username }}:{{ .Values.postgres.credentials.password }}@postgres-source:5432/{{ .Values.postgres.credentials.database }}?sslmode=disable
          ports:
            - name: http
              containerPort: 8081
---
