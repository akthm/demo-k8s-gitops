apiVersion: v1
kind: ConfigMap
metadata:
  name: transit-demo-sql
  labels:
    {{- include "transit-demo.labels" . | nindent 4 }}
data:
  01_source_schema.sql: |
    CREATE TABLE IF NOT EXISTS dim_route (
        route_id         TEXT PRIMARY KEY,
        route_short_name TEXT NOT NULL,
        route_long_name  TEXT NOT NULL
    );

    CREATE TABLE IF NOT EXISTS dim_stop (
        stop_id       TEXT PRIMARY KEY,
        stop_name     TEXT NOT NULL,
        route_id      TEXT NOT NULL REFERENCES dim_route(route_id),
        stop_sequence INT  NOT NULL
    );

    CREATE TABLE IF NOT EXISTS fact_arrival_event (
        event_id          SERIAL PRIMARY KEY,
        route_id          TEXT NOT NULL REFERENCES dim_route(route_id),
        route_short_name  TEXT NOT NULL,
        stop_id           TEXT NOT NULL REFERENCES dim_stop(stop_id),
        stop_name         TEXT NOT NULL,
        vehicle_ref       TEXT NOT NULL,
        scheduled_arrival TIMESTAMPTZ NOT NULL,
        predicted_arrival TIMESTAMPTZ NOT NULL,
        delay_seconds     INT NOT NULL,
        ingested_at       TIMESTAMPTZ NOT NULL DEFAULT now(),
        UNIQUE (route_id, stop_id, vehicle_ref)
    );

    CREATE PUBLICATION transit_pub FOR TABLE fact_arrival_event;

