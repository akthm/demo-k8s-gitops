  02_gtfs_schema.sql: |
    CREATE SCHEMA IF NOT EXISTS gtfs_dim;

    CREATE TABLE IF NOT EXISTS gtfs_dim.route (
        route_id          TEXT PRIMARY KEY,
        route_short_name  TEXT NOT NULL,
        route_long_name   TEXT,
        agency_id         TEXT,
        loaded_at         TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE IF NOT EXISTS gtfs_dim.stop (
        stop_id           TEXT PRIMARY KEY,
        stop_name         TEXT NOT NULL,
        stop_lat          DOUBLE PRECISION,
        stop_lon          DOUBLE PRECISION,
        loaded_at         TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE IF NOT EXISTS gtfs_dim.route_stop (
        route_id          TEXT NOT NULL REFERENCES gtfs_dim.route(route_id),
        stop_id           TEXT NOT NULL REFERENCES gtfs_dim.stop(stop_id),
        stop_sequence     INT NOT NULL,
        loaded_at         TIMESTAMPTZ NOT NULL DEFAULT now(),
        PRIMARY KEY (route_id, stop_id)
    );

    CREATE INDEX IF NOT EXISTS idx_gtfs_route_short_name
        ON gtfs_dim.route(route_short_name);

    CREATE INDEX IF NOT EXISTS idx_gtfs_route_stop_sequence
        ON gtfs_dim.route_stop(route_id, stop_sequence);

  03_dwh_schema.sql: |
    CREATE SCHEMA IF NOT EXISTS dwh;

    CREATE TABLE IF NOT EXISTS dwh.mart_route_performance (
        mart_id             BIGSERIAL PRIMARY KEY,
        computed_at         TIMESTAMPTZ NOT NULL DEFAULT now(),
        route_short_name    TEXT NOT NULL,
        observations        INT NOT NULL,
        avg_delay_seconds   INT NOT NULL,
        max_delay_seconds   INT NOT NULL
    );

    CREATE INDEX IF NOT EXISTS idx_mart_route_perf_computed_at
        ON dwh.mart_route_performance(computed_at DESC);

    CREATE INDEX IF NOT EXISTS idx_mart_route_perf_route
        ON dwh.mart_route_performance(route_short_name, computed_at DESC);
