global:
  namespace: transit-demo

storage:
  mirror:
    enabled: true
    claimName: postgres-mirror-data-v2
    size: 50Gi
    storageClassName: oci-bv-paravirtualized

# Use pushed images accessible from OKE nodes.
# Replace repositories/tags with your registry artifacts.
connect:
  image:
    repository: docker.io/akthm/etl-connect
    tag: "latest"
  heapOpts: "-Xms128M -Xmx384M"
  resources:
    requests:
      cpu: 50m
      memory: 320Mi
    limits:
      cpu: 300m
      memory: 768Mi

simulator:
  image:
    repository: docker.io/akthm/etl-simulator
    tag: "latest"
  resources:
    requests:
      cpu: 20m
      memory: 96Mi
    limits:
      cpu: 120m
      memory: 192Mi

prefectRunner:
  image:
    repository: docker.io/akthm/etl-prefect-runner
    tag: "latest"
  resources:
    requests:
      cpu: 40m
      memory: 192Mi
    limits:
      cpu: 250m
      memory: 512Mi

postgres:
  source:
    image:
      repository: docker.io/library/postgres
      tag: "16"
    resources:
      requests:
        cpu: 60m
        memory: 192Mi
      limits:
        cpu: 250m
        memory: 384Mi
  mirror:
    image:
      repository: docker.io/library/postgres
      tag: "16"
    resources:
      requests:
        cpu: 80m
        memory: 320Mi
      limits:
        cpu: 400m
        memory: 768Mi

redpanda:
  startMemory: 512M
  resources:
    requests:
      cpu: 50m
      memory: 320Mi
    limits:
      cpu: 300m
      memory: 768Mi

prefect:
  image:
    repository: docker.io/prefecthq/prefect
    tag: "3-python3.12"
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      cpu: 250m
      memory: 384Mi

pgweb:
  source:
    image:
      repository: docker.io/sosedoff/pgweb
      tag: "latest"
  mirror:
    image:
      repository: docker.io/sosedoff/pgweb
      tag: "latest"

portal:
  image:
    repository: docker.io/library/nginx
    tag: "1.27-alpine"

lakeConsumer:
  enabled: false
  image:
    repository: docker.io/akthm/etl-lake-consumer
    tag: "latest"

# Keep optional components off for free-tier profile.
minio:
  enabled: false

ingress:
  enabled: true
  className: nginx
  basicAuth:
    enabled: false
    secretName: transit-demo-basic-auth
  tls:
    enabled: true
    secretName: platform-oci-staging-tls
  portal:
    host: transit-demo.adaas-il.com
  prefect:
    host: prefect-transit.adaas-il.com
  pgwebSource:
    host: pgweb-source-transit.adaas-il.com
  pgwebMirror:
    host: pgweb-mirror-transit.adaas-il.com
  minio:
    enabled: false
