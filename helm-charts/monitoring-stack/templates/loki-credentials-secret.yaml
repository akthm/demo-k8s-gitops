{{- if .Values.lokiStack.enabled }}
---
# ==============================================================================
# Loki Object Storage Credentials
# ==============================================================================
# Extracts S3-compatible OCI Object Storage credentials from the consolidated
# monitoring secret in OCI Vault.
#
# Required secret keys in OCI Vault secret (monitoring by default):
# - LOKI_S3_ACCESS_KEY_ID
# - LOKI_S3_SECRET_ACCESS_KEY
# ==============================================================================
apiVersion: 'external-secrets.io/{{ .Values.externalSecrets.apiVersion | default "v1beta1" }}'
kind: ExternalSecret
metadata:
  name: {{ .Values.lokiStack.storage.credentials.secretName | default "loki-storage-credentials" }}
  namespace: {{ .Values.lokiStack.namespace | default "monitoring" }}
  labels:
    {{- include "monitoring-stack.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ .Values.lokiStack.storage.credentials.refreshInterval | default "5m" | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name | default "oci-vault" }}
    kind: {{ .Values.externalSecrets.secretStore.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.lokiStack.storage.credentials.secretName | default "loki-storage-credentials" }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        LOKI_S3_ACCESS_KEY_ID: {{`"{{ .LOKI_S3_ACCESS_KEY_ID }}"`}}
        LOKI_S3_SECRET_ACCESS_KEY: {{`"{{ .LOKI_S3_SECRET_ACCESS_KEY }}"`}}
  dataFrom:
    - extract:
        key: {{ .Values.externalSecrets.appSecretKey | default "monitoring" }}
{{- end }}