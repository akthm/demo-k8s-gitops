# ==============================================================================
# Monitoring Stack - OCI Production
# ==============================================================================
# TODO: Update domain, vault secrets, and storage class for production.
# ==============================================================================

kubePrometheusStack:
  enabled: true
  namespace: monitoring
  version: "55.5.0"

  prometheus:
    retention: 30d
    scrapeInterval: 30s
    scrapeTimeout: 10s
    evaluationInterval: 30s

    storage:
      enabled: false  # Disabled: eliminates 50GB OCI block volume; metrics lost on restart
      size: 50Gi
      storageClassName: oci-bv-paravirtualized

    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

    serviceMonitorSelector:
      matchLabels:
        release: prometheus

    ruleSelector:
      matchLabels:
        release: prometheus

    externalLabels:
      cluster: oci-production
      environment: production

  grafana:
    enabled: true
    adminPassword: ""

    persistence:
      enabled: false  # Disabled: eliminates 50GB OCI block volume; dashboards loaded from ConfigMaps
      size: 10Gi
      storageClassName: oci-bv-paravirtualized

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL

    envValueFrom:
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
        secretKeyRef:
          name: grafana-oauth-secret
          key: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET

    "grafana.ini":
      server:
        domain: grafana.adaas-il.com  # TODO: Update for production domain
        root_url: "https://grafana.adaas-il.com"

      auth:
        disable_login_form: false

      "auth.generic_oauth":
        enabled: true
        name: Keycloak
        allow_sign_up: true
        auto_login: false
        client_id: grafana
        scopes: "openid profile email groups"
        auth_url: https://keycloak.adaas-il.com/realms/master/protocol/openid-connect/auth
        token_url: https://keycloak.adaas-il.com/realms/master/protocol/openid-connect/token
        api_url: https://keycloak.adaas-il.com/realms/master/protocol/openid-connect/userinfo
        role_attribute_path: "contains(groups[*], 'platform-developers') && 'Admin' || contains(groups[*], 'monitoring-viewers') && 'Viewer' || 'Viewer'"
        role_attribute_strict: false
        groups_attribute_path: groups
        use_pkce: true
        empty_scopes: false

    datasources:
      loki:
        enabled: false
        url: http://loki.monitoring.svc.cluster.local:3100

certManagerServiceMonitor:
  enabled: true
  namespace: cert-manager
  interval: 60s
  scrapeTimeout: 10s

externalSecrets:
  enabled: true
  apiVersion: "v1"
  secretStore:
    name: oci-vault
    kind: ClusterSecretStore
  appSecretKey: "monitoring"

# ------------------------------------------------------------------------------
# Loki Stack - Prepared for staged rollout
# ------------------------------------------------------------------------------
lokiStack:
  enabled: false
  namespace: monitoring
  releaseName: loki
  deploymentMode: SingleBinary
  replicas: 2
  lokiUrl: http://loki.monitoring.svc.cluster.local:3100

  chart:
    repoURL: https://grafana.github.io/helm-charts
    name: loki
    version: "6.27.0"

  schema:
    from: "2024-01-01"
    indexPrefix: loki_index_
    indexPeriod: 24h

  loki:
    retention: 720h

  storage:
    credentials:
      secretName: loki-storage-credentials
      refreshInterval: 5m
      # OCI Vault secret (monitoring) must contain:
      # - LOKI_S3_ACCESS_KEY_ID
      # - LOKI_S3_SECRET_ACCESS_KEY
    s3:
      endpoint: https://<TENANCY_NAMESPACE>.compat.objectstorage.<OCI_REGION>.oraclecloud.com
      region: <OCI_REGION>
      s3ForcePathStyle: true
      insecure: false
    buckets:
      chunks: loki-prod-chunks
      ruler: loki-prod-ruler
      admin: loki-prod-admin

  promtail:
    enabled: false
    releaseName: promtail
    chart:
      repoURL: https://grafana.github.io/helm-charts
      name: promtail
      version: "6.16.6"
