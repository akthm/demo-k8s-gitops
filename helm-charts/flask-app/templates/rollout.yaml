{{- if .Values.blueGreen.enabled }}
# ==============================================================================
# Argo Rollout - Blue/Green Deployment (replaces Deployment when enabled)
# ==============================================================================
# activeService  → live traffic (production)
# previewService → new version is deployed here first for validation
# Promotion is controlled by .Values.blueGreen.autoPromotionEnabled
#   - false (prod)  → manual `kubectl argo rollouts promote <name>`
#   - true  (staging) → auto promote after autoPromotionSeconds
# ==============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "flask-app.fullname" . }}
  labels:
    {{- include "flask-app.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.blueGreen.revisionHistoryLimit | default 3 }}
  selector:
    matchLabels:
      {{- include "flask-app.selectorLabels" . | nindent 6 }}
  # ============================================================
  # Blue/Green Strategy
  # ============================================================
  strategy:
    blueGreen:
      # Active service receives production traffic
      activeService: {{ include "flask-app.fullname" . }}
      # Preview service receives the new (green) version first
      previewService: {{ include "flask-app.fullname" . }}-preview
      # Auto-promote:
      #   false = manual promotion required (recommended for prod)
      #   true  = auto promote after autoPromotionSeconds (staging)
      autoPromotionEnabled: {{ .Values.blueGreen.autoPromotionEnabled }}
      {{- if .Values.blueGreen.autoPromotionSeconds }}
      autoPromotionSeconds: {{ .Values.blueGreen.autoPromotionSeconds }}
      {{- end }}
      # Scale-down delay: keep old (blue) pods running for N seconds after
      # promotion so they can finish in-flight requests
      scaleDownDelaySeconds: {{ .Values.blueGreen.scaleDownDelaySeconds | default 30 }}
      {{- if .Values.blueGreen.previewReplicaCount }}
      previewReplicaCount: {{ .Values.blueGreen.previewReplicaCount }}
      {{- end }}
      # Labels injected into active pods (adds 'slot: blue' or 'slot: green')
      {{- with .Values.blueGreen.activeMetadata }}
      activeMetadata:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Labels injected into preview pods
      {{- with .Values.blueGreen.previewMetadata }}
      previewMetadata:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  # ============================================================
  # Pod Template (identical to Deployment spec)
  # ============================================================
  template:
    metadata:
      annotations:
        {{- if .Values.monitoring.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if .Values.rotation.reloader.enabled }}
        {{- if .Values.rotation.reloader.autoRestart }}
        reloader.stakater.com/auto: "true"
        {{- else }}
        reloader.stakater.com/search: "true"
        secret.reloader.stakater.com/reload: "{{ include "flask-app.fullname" . }}-jwt-keys,{{ .Values.secretNames.databaseCredentials }}"
        {{- end }}
      {{- end }}
      labels:
        {{- include "flask-app.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "flask-app.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.database.wallet.enabled }}
      initContainers:
        - name: download-wallet
          image: ghcr.io/oracle/oci-cli:latest
          command:
            - sh
            - -c
            - |
              set -e
              echo "Downloading ATP wallet from Object Storage..."
              export OCI_CLI_AUTH=instance_principal
              BUCKET_NAME=$(cat /bucket-info/bucket_name)
              NAMESPACE=$(cat /bucket-info/namespace)
              OBJECT_NAME=$(cat /bucket-info/object_name)
              REGION=$(cat /bucket-info/region)
              oci os object get \
                --namespace "$NAMESPACE" \
                --bucket-name "$BUCKET_NAME" \
                --name "$OBJECT_NAME" \
                --file /wallet-download/wallet.zip \
                --region "$REGION" \
                --auth instance_principal
              echo "Wallet downloaded successfully"
              ls -lh /wallet-download/
          volumeMounts:
            - name: wallet-bucket-info
              mountPath: /bucket-info
              readOnly: true
            - name: wallet-download
              mountPath: /wallet-download
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: extract-wallet
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              echo "Extracting wallet files..."
              unzip -q /wallet-download/wallet.zip -d /wallet
              echo "Wallet extraction complete"
              ls -lh /wallet/
          volumeMounts:
            - name: wallet-download
              mountPath: /wallet-download
              readOnly: true
            - name: wallet-dir
              mountPath: /wallet
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: decrypt-wallet
          image: docker.io/alpine/openssl:latest
          command:
            - sh
            - -c
            - |
              set -e
              echo "Decrypting ewallet.pem with password..."
              WALLET_PASSWORD=$(cat /wallet-password/WALLET_PASSWORD)
              openssl pkcs8 -inform PEM -in /wallet/ewallet.pem -passin pass:"${WALLET_PASSWORD}" -out /wallet/ewallet_decrypted_key.pem
              grep -A 100 "BEGIN CERTIFICATE" /wallet/ewallet.pem > /wallet/ewallet_certs.pem || true
              cat /wallet/ewallet_decrypted_key.pem /wallet/ewallet_certs.pem > /wallet/ewallet_combined.pem
              mv /wallet/ewallet_combined.pem /wallet/ewallet.pem
              rm -f /wallet/ewallet_decrypted_key.pem /wallet/ewallet_certs.pem
              chmod 640 /wallet/*
              chmod g+r /wallet/*
              echo "Wallet decryption complete"
              wc -c /wallet/ewallet.pem
          volumeMounts:
            - name: wallet-dir
              mountPath: /wallet
            - name: wallet-password
              mountPath: /wallet-password
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "flask-app.fullname" . }}-config
          {{- if .Values.secretNames.databaseCredentials }}
            - secretRef:
                name: {{ .Values.secretNames.databaseCredentials }}
          {{- end }}
          {{- if .Values.secretNames.flaskSecret }}
            - secretRef:
                name: {{ .Values.secretNames.flaskSecret }}
          {{- end }}
          {{- if .Values.secretNames.adminCredentials }}
            - secretRef:
                name: {{ .Values.secretNames.adminCredentials }}
          {{- end }}
          env:
              {{- if .Values.jwt.enabled }}
            - name: JWT_ALGORITHM
              value: {{ .Values.jwt.algorithm | quote }}
            - name: JWT_ISSUER
              value: {{ .Values.jwt.issuer | quote }}
            - name: JWT_AUDIENCE
              value: {{ .Values.jwt.audience | quote }}
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jwt.existingSecret }}
                  key: {{ .Values.jwt.privateKeyKey }}
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jwt.existingSecret }}
                  key: {{ .Values.jwt.publicKeyKey }}
              {{- end }}
              {{- if .Values.oidc.enabled }}
            - name: OIDC_ENABLED
              value: "true"
            - name: OIDC_ISSUER
              value: {{ .Values.oidc.issuer | quote }}
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-oidc" (include "flask-app.fullname" .)) .Values.oidc.existingSecret }}
                  key: OIDC_CLIENT_ID
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-oidc" (include "flask-app.fullname" .)) .Values.oidc.existingSecret }}
                  key: OIDC_CLIENT_SECRET
            - name: OIDC_SCOPES
              value: {{ .Values.oidc.scopes | quote }}
            - name: OIDC_AUDIENCE
              value: {{ .Values.oidc.audience | quote }}
            - name: OIDC_ALGORITHMS
              value: {{ .Values.oidc.algorithms | join "," | quote }}
            - name: OIDC_GROUPS_CLAIM
              value: {{ .Values.oidc.groupsClaim | quote }}
              {{- end }}
              {{- if .Values.bff.enabled }}
            - name: AUTH_MODE
              value: "bff"
            - name: BFF_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bff.internalSecretRef.name | quote }}
                  key: {{ .Values.bff.internalSecretRef.key | quote }}
            - name: BFF_INTERNAL_SECRET_HEADER
              value: {{ .Values.bff.headers.internalAuth | quote }}
            - name: BFF_HEADER_SUB
              value: {{ .Values.bff.headers.sub | quote }}
            - name: BFF_HEADER_EMAIL
              value: {{ .Values.bff.headers.email | quote }}
            - name: BFF_HEADER_USERNAME
              value: {{ .Values.bff.headers.username | quote }}
            - name: BFF_HEADER_GROUPS
              value: {{ .Values.bff.headers.groups | quote }}
            - name: BFF_TOKEN_HEADER
              value: {{ .Values.bff.headers.token | quote }}
            - name: BFF_VALIDATE_JWT
              value: {{ .Values.bff.validateJwt | quote }}
            - name: BFF_JIT_PROVISION
              value: {{ .Values.bff.jitProvision | quote }}
            - name: BFF_ROLES_SOURCE
              value: {{ .Values.bff.rolesSource | quote }}
            - name: CSRF_ENABLED
              value: {{ .Values.bff.csrf.enabled | quote }}
            - name: CSRF_COOKIE_NAME
              value: {{ .Values.bff.csrf.cookieName | quote }}
            - name: CSRF_HEADER_NAME
              value: {{ .Values.bff.csrf.headerName | quote }}
              {{- end }}
            {{- if .Values.database.wallet.enabled }}
            - name: TNS_ADMIN
              value: {{ .Values.database.wallet.mountPath | default "/opt/oracle/wallet" | quote }}
            - name: ORACLE_WALLET_DIR
              value: {{ .Values.database.wallet.mountPath | default "/opt/oracle/wallet" | quote }}
            - name: ORACLE_DSN
              value: {{ .Values.database.wallet.tnsAlias | quote }}
            - name: ORACLE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretNames.databaseCredentials }}
                  key: DB_USER
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretNames.databaseCredentials }}
                  key: DB_PASSWORD
            - name: ORACLE_WALLET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "flask-app.fullname" . }}-wallet-password
                  key: WALLET_PASSWORD
            {{- if .Values.database.wallet.poolMin }}
            - name: ORACLE_POOL_MIN
              value: {{ .Values.database.wallet.poolMin | quote }}
            {{- end }}
            {{- if .Values.database.wallet.poolMax }}
            - name: ORACLE_POOL_MAX
              value: {{ .Values.database.wallet.poolMax | quote }}
            {{- end }}
            {{- if .Values.database.wallet.poolIncrement }}
            - name: ORACLE_POOL_INCREMENT
              value: {{ .Values.database.wallet.poolIncrement | quote }}
            {{- end }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.database.wallet.enabled }}
          - name: wallet-dir
            mountPath: {{ .Values.database.wallet.mountPath | default "/opt/oracle/wallet" }}
            readOnly: true
          {{- end }}
          - name: db-encryption-keys
            mountPath: /run/secrets/db_encryption_keys
            readOnly: true
      volumes:
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.database.wallet.enabled }}
      - name: wallet-bucket-info
        secret:
          secretName: {{ include "flask-app.fullname" . }}-wallet-bucket-info
          defaultMode: 0400
      - name: wallet-password
        secret:
          secretName: {{ include "flask-app.fullname" . }}-wallet-password
          defaultMode: 0400
      - name: wallet-download
        emptyDir: {}
      - name: wallet-dir
        emptyDir: {}
      {{- end }}
      - name: db-encryption-keys
        projected:
          defaultMode: 0400
          sources:
          - secret:
              name: {{ .Values.secretNames.encryptionKeys | default "flask-app-encryption-keys" }}
              items:
              {{- if .Values.rotation.database.keyVersions }}
              {{- range .Values.rotation.database.keyVersions }}
              - key: db_encryption_{{ . }}.key
                path: {{ . }}.key
              {{- end }}
              {{- else }}
              - key: db_encryption_v1.key
                path: v1.key
              {{- end }}
              - key: db_encryption_current.version
                path: current.version
              {{- if .Values.rotation.database.enabled }}
              - key: rotation_date
                path: rotation_date
              - key: migration_status
                path: migration_status
              {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
